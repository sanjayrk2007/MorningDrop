name: Daily Morning Drop Curation

on:
  schedule:
    # 11:30 PM UTC (previous day) is 5:00 AM IST (IST is UTC +5:30)
    # Shifting earlier to account for GitHub Actions schedule trigger delays
    - cron: '30 23 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Curation Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python main.py --auto

      - name: Commit and push database updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.db
          if git diff --staged --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: update database with processed articles [skip ci]"
            git push
          fi
